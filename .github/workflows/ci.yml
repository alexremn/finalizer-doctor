name: ci
on:
  pull_request: {}
  workflow_dispatch: {} # allow manual runs
  workflow_call: {} # reused by the release workflow as a gate
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with: { go-version: "1.26" }
      - run: go test -race -coverprofile=coverage.out ./...
      - run: go tool cover -func=coverage.out | tail -n 1
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with: { go-version: "1.26" }
      - uses: golangci/golangci-lint-action@v9
        with: { version: latest }
  # ponytail: dropped the integration job — no //go:build integration tests exist
  # yet, so it was a no-op that still paid to download envtest. Add a real envtest
  # suite + this job together in v0.2.
