version: 2
builds:
  - id: finalizer_doctor
    main: ./cmd/finalizer-doctor
    binary: kubectl-finalizer_doctor
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/alexremn/finalizer-doctor/internal/cli.Version={{.Version}}
      - -X github.com/alexremn/finalizer-doctor/internal/cli.Commit={{.Commit}}
      - -X github.com/alexremn/finalizer-doctor/internal/cli.Date={{.Date}}
  - id: fid
    main: ./cmd/finalizer-doctor
    binary: kubectl-fid
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/alexremn/finalizer-doctor/internal/cli.Version={{.Version}}
      - -X github.com/alexremn/finalizer-doctor/internal/cli.Commit={{.Commit}}
      - -X github.com/alexremn/finalizer-doctor/internal/cli.Date={{.Date}}
archives:
  - id: default
    ids: [finalizer_doctor, fid]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
sboms:
  - artifacts: archive
changelog:
  # GitHub-rendered notes (no raw commit SHAs); categories come from
  # .github/release.yml. The curated header below is the real release note.
  use: github-native
release:
  draft: true
  header: |
    A safe, evidence-based doctor for Kubernetes resources stuck in `Terminating`.
    It pinpoints the finalizer and the dead controller / APIService blocking
    deletion, cleans truly-orphaned resources first, and clears finalizers only as
    a gated last resort — **dry-run by default**.

    ### Highlights
    - 🩺 **Diagnose any finalizer-blocked resource** — namespaces, CRs, PVs, arbitrary CRDs.
    - ⚖️ **Evidence-based verdict** (`strict` default, `score` opt-in) — clears only on hard proof the owner is dead; a live or unreadable signal vetoes it, and time alone never does.
    - 🧹 **Safe ordering** — clean true orphans first, refuse on a dead-backed `failurePolicy=Fail` webhook, clear the finalizer last.
    - 🔒 **Proof-bound apply** — `--confirm` digest + per-action re-verify + `resourceVersion` preconditions + RBAC pre-flight.
    - 📦 **Homebrew, krew, or static binaries** — `kubectl finalizer-doctor` (alias `kubectl fid`).

    ### Install
    ```sh
    brew install alexremn/tap/finalizer-doctor
    # or download a binary from the assets below
    ```

    ⚠️ Clearing a finalizer is irreversible. This tool exists to make that decision
    *safely* — read the [safety model](https://github.com/alexremn/finalizer-doctor#safety-model) first.

    ---
  # No footer: github-native already appends a "Full Changelog" link.
brews:
  - name: finalizer-doctor
    repository:
      owner: alexremn
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/alexremn/finalizer-doctor
    description: Safely diagnose and clear finalizers on stuck-Terminating Kubernetes resources
    license: Apache-2.0
    commit_author:
      name: goreleaser-bot
      email: goreleaser@users.noreply.github.com
    install: |
      bin.install "kubectl-finalizer_doctor"
      bin.install "kubectl-fid"
    test: |
      system "#{bin}/kubectl-finalizer_doctor", "version"
    caveats: |
      Installed as kubectl plugins (both binaries are placed on your PATH):
        kubectl finalizer-doctor <target>
        kubectl fid <target>
