version: 2
builds:
  - id: finalizer_doctor
    main: ./cmd/finalizer-doctor
    binary: kubectl-finalizer_doctor
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/alexremn/finalizer-doctor/internal/cli.Version={{.Version}}
      - -X github.com/alexremn/finalizer-doctor/internal/cli.Commit={{.Commit}}
      - -X github.com/alexremn/finalizer-doctor/internal/cli.Date={{.Date}}
  - id: fid
    main: ./cmd/finalizer-doctor
    binary: kubectl-fid
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/alexremn/finalizer-doctor/internal/cli.Version={{.Version}}
      - -X github.com/alexremn/finalizer-doctor/internal/cli.Commit={{.Commit}}
      - -X github.com/alexremn/finalizer-doctor/internal/cli.Date={{.Date}}
archives:
  - id: default
    ids: [finalizer_doctor, fid]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
sboms:
  - artifacts: archive
changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Refactors
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 3
    - title: Documentation
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 4
    - title: Other changes
      order: 999
  filters:
    exclude:
      - '^test:'
      - '^chore:'
      - '^ci:'
      - '^style:'
      - '^Merge '
release:
  draft: true
  header: |
    ## finalizer-doctor {{ .Tag }}

    A safe stuck-`Terminating` doctor for Kubernetes. Install with Homebrew
    (`brew install alexremn/tap/finalizer-doctor`), krew, or the binaries below.
  footer: |
    {{ if .PreviousTag }}**Full changelog**: https://github.com/alexremn/finalizer-doctor/compare/{{ .PreviousTag }}...{{ .Tag }}{{ end }}
brews:
  - name: finalizer-doctor
    repository:
      owner: alexremn
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/alexremn/finalizer-doctor
    description: Safely diagnose and clear finalizers on stuck-Terminating Kubernetes resources
    license: Apache-2.0
    commit_author:
      name: goreleaser-bot
      email: goreleaser@users.noreply.github.com
    install: |
      bin.install "kubectl-finalizer_doctor"
      bin.install "kubectl-fid"
    test: |
      system "#{bin}/kubectl-finalizer_doctor", "version"
    caveats: |
      Installed as kubectl plugins (both binaries are placed on your PATH):
        kubectl finalizer-doctor <target>
        kubectl fid <target>
