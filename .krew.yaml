apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: finalizer-doctor
spec:
  version: "{{ .TagName }}"
  homepage: https://github.com/alexremn/finalizer-doctor
  shortDescription: Safely diagnose and clear finalizers on stuck-Terminating resources
  description: |
    Pinpoints the finalizer and dead controller/APIService blocking deletion,
    cleans truly-orphaned resources first, and clears finalizers only as a gated
    last resort. Dry-run and explain by default.
  platforms:
    - selector: { matchLabels: { os: linux, arch: amd64 } }
      uri: https://github.com/alexremn/finalizer-doctor/releases/download/{{ .TagName }}/finalizer-doctor_linux_amd64.tar.gz
      sha256: "{{ .Sha256 }}"
      bin: kubectl-finalizer_doctor
      files: [{ from: kubectl-finalizer_doctor, to: . }]
    - selector: { matchLabels: { os: linux, arch: arm64 } }
      uri: https://github.com/alexremn/finalizer-doctor/releases/download/{{ .TagName }}/finalizer-doctor_linux_arm64.tar.gz
      sha256: "{{ .Sha256 }}"
      bin: kubectl-finalizer_doctor
      files: [{ from: kubectl-finalizer_doctor, to: . }]
    - selector: { matchLabels: { os: darwin, arch: amd64 } }
      uri: https://github.com/alexremn/finalizer-doctor/releases/download/{{ .TagName }}/finalizer-doctor_darwin_amd64.tar.gz
      sha256: "{{ .Sha256 }}"
      bin: kubectl-finalizer_doctor
      files: [{ from: kubectl-finalizer_doctor, to: . }]
    - selector: { matchLabels: { os: darwin, arch: arm64 } }
      uri: https://github.com/alexremn/finalizer-doctor/releases/download/{{ .TagName }}/finalizer-doctor_darwin_arm64.tar.gz
      sha256: "{{ .Sha256 }}"
      bin: kubectl-finalizer_doctor
      files: [{ from: kubectl-finalizer_doctor, to: . }]
    - selector: { matchLabels: { os: windows, arch: amd64 } }
      uri: https://github.com/alexremn/finalizer-doctor/releases/download/{{ .TagName }}/finalizer-doctor_windows_amd64.tar.gz
      sha256: "{{ .Sha256 }}"
      bin: kubectl-finalizer_doctor.exe
      files: [{ from: kubectl-finalizer_doctor.exe, to: . }]
